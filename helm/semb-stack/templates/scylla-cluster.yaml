# Source: scylla/templates/scyllacluster.yaml
apiVersion: scylla.scylladb.com/v1
kind: ScyllaCluster
metadata:
  name: scylla
spec:
  developerMode: true
  sysctls:
    - fs.aio-max-nr=30000000
  datacenter:
    name: local-kind-1
    racks:
      - members: 1
        name: local-kind-1a
        scyllaConfig: scylladb-config
        resources:
          limits:
            cpu: "500m"
            memory: "1Gi"
          requests:
            cpu: "250m"
            memory: "512Mi"
        storage:
          capacity: 5Gi
          storageClassName: standard
